name: release
run-name: release ${{ github.event.inputs.version || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading 'v')"
        required: true
        default: "0.1.2"

jobs:
  build:
    runs-on: macos-14

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - arch: arm64
            channel: osx-arm64
          - arch: x86_64
            channel: osx-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "value=${TAG#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build .app
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: ./build.sh ${{ matrix.arch }}

      - name: Install Velopack tool
        run: dotnet tool install --global vpk

      - name: Pack with Velopack
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          vpk pack \
            --packId MyMic \
            --packTitle "MyMic" \
            --packVersion "$VERSION" \
            --packDir dist/MyMic.app \
            --mainExe MyMic \
            --icon MyMic/macOS/AppIcon.icns \
            --channel ${{ matrix.channel }} \
            -y

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyMic-installer-${{ matrix.channel }}
          path: Releases/*Setup.pkg
          if-no-files-found: error

      - name: Upload updater artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyMic-updater-${{ matrix.channel }}
          path: |
            Releases/*.nupkg
            Releases/*Portable.zip
            Releases/RELEASES-*
            Releases/releases.*.json
            Releases/assets.*.json
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
