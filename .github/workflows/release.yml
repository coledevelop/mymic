name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading 'v')"
        required: true
        default: "0.1.0"

jobs:
  build:
    runs-on: macos-14

    permissions:
      contents: write

    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "value=${TAG#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build .app
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: ./build.sh ${{ matrix.arch }}

      - name: Package DMG
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: ./package-dmg.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyMic-${{ matrix.arch }}
          path: dist/MyMic-*.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
